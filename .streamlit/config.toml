# Tema institucional UdeA — identidad del póster de sustentación
# Teal institucional (#007297) + lima de acento. Limpio, profesional,
# optimizado para lectura prolongada y proyección en sala.

[theme]
base = "light"
primaryColor       = "#007297"   # Teal institucional UdeA (identidad del póster)
backgroundColor    = "#FFFFFF"
secondaryBackgroundColor = "#F4F8F9"
codeBackgroundColor      = "#EEF4F5"
textColor           = "#0F2A30"   # Teal muy oscuro
linkColor           = "#007297"
borderColor         = "#CBD9DC"
codeTextColor       = "#134152"
showWidgetBorder = true
showSidebarBorder = true
baseRadius   = "8px"
buttonRadius = "8px"

font = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
headingFont = "'Inter':https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap"
codeFont = "'JetBrains Mono':https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"
baseFontSize = 14
baseFontWeight = 400
codeFontSize = "13px"
headingFontSizes = ["28px", "22px", "18px", "16px", "14px", "12px"]
headingFontWeights = [700, 600, 600, 600, 500, 500]
linkUnderline = false

# Colores semánticos (accesibles sobre blanco)
greenColor  = "#4C9A2A"   # sostenible / lima institucional oscurecida
redColor    = "#B91C1C"   # no viable
yellowColor = "#B45309"   # cap activo / advertencia
orangeColor = "#C2410C"
blueColor   = "#0E7490"
violetColor = "#6D28D9"
grayColor   = "#475569"

# Paleta categorical: teal institucional primero, luego accesible (Paul Tol)
chartCategoricalColors = [
    "#007297",   # teal UdeA
    "#4C9A2A",   # verde lima institucional
    "#B45309",   # ámbar académico
    "#B91C1C",   # rojo señal
    "#6D28D9",   # violeta
    "#0E7490",   # cian profundo
    "#9F1239",   # rosa profundo
    "#475569",   # gris pizarra
]
chartSequentialColors = [
    "#ECF6F8","#D3E9EE","#A9D4DD","#7FBFCC","#54A9BB",
    "#2A94AA","#007297","#005E7E","#004A64","#00374B",
]

dataframeBorderColor = "#CBD9DC"
dataframeHeaderBackgroundColor = "#EEF4F5"

[theme.sidebar]
backgroundColor = "#F4F8F9"
secondaryBackgroundColor = "#FFFFFF"
codeBackgroundColor = "#EEF4F5"
textColor = "#0F2A30"
borderColor = "#CBD9DC"
primaryColor = "#007297"

[server]
headless = true
